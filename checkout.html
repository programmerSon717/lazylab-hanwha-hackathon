<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>결제 — lazylab</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="products">
  <header id="site-header"></header>
  <main class="doc" id="page"></main>
  <footer id="site-footer"></footer>

  <script src="./config.js"></script>
  <script src="./content.js"></script>
  <script src="./platform-data.js"></script>
  <script src="./terms-data.js"></script>
  <script src="./layout.js"></script>
  <script>
    const won = LZ.won;
    const C = window.LAZY_CONFIG || {};
    const params = new URLSearchParams(location.search);
    const p = LZ.byId(params.get("id")) || PRODUCTS[0];
    const first = p.premium + p.deposit;
    const pageEl = document.getElementById("page");
    document.title = "결제 — " + p.name;

    function showDone(method) {
      // 가입 상품 기록 (마이페이지에서 사용)
      try {
        const list = JSON.parse(localStorage.getItem("lz_products") || "[]");
        if (!list.includes(p.id)) { list.push(p.id); localStorage.setItem("lz_products", JSON.stringify(list)); }
      } catch (e) {}
      pageEl.innerHTML = `
        <div class="pay-done">
          <div class="check-lg">✓</div>
          <h2>결제 완료!</h2>
          <p><b>${p.name}</b>에 가입되었습니다.</p>
          <div class="receipt">
            <div class="co-row"><span>상품</span><b>${p.emoji} ${p.name}</b></div>
            <div class="co-row"><span>결제수단</span><b>${method}</b></div>
            <div class="co-row"><span>월 보험료</span><b>${won(p.premium)}</b></div>
            <div class="co-row"><span>환급 디포짓</span><b>${won(p.deposit)}</b></div>
            <div class="co-total"><span>결제 금액</span><b>${won(first)}</b></div>
          </div>
          <p class="pay-msg">이제 게으름은 lazylab이 책임집니다. 😌<br>${p.refund}</p>
          <div class="done-actions">
            <a class="btn-primary" href="index.html">홈으로</a>
            <a class="btn-ghost" href="reviews.html">가입 후기 보기</a>
          </div>
          <p class="co-legal">※ 카카오페이는 테스트 결제(TC0ONETIME)이며 실제 청구는 발생하지 않습니다.</p>
        </div>`;
      window.scrollTo(0, 0);
    }

    // 카카오페이 승인 복귀 처리
    if (params.get("pay") === "approve" && params.get("pg_token")) {
      const saved = JSON.parse(sessionStorage.getItem("lz_pay") || "{}");
      fetch(C.API_BASE + "/pay-approve", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ tid: saved.tid, order: saved.order, pg_token: params.get("pg_token") }),
      })
        .then((r) => r.json())
        .then((d) => {
          sessionStorage.removeItem("lz_pay");
          if (d && (d.aid || d.amount)) showDone("카카오페이");
          else { alert("결제 승인에 실패했어요."); renderForm(); }
        })
        .catch(() => { alert("결제 승인 중 오류가 발생했어요."); renderForm(); });
    } else if (params.get("pay") === "cancel") {
      alert("결제가 취소되었습니다."); history.replaceState({}, "", "checkout.html?id=" + p.id); renderForm();
    } else if (params.get("pay") === "fail") {
      alert("결제에 실패했습니다."); history.replaceState({}, "", "checkout.html?id=" + p.id); renderForm();
    } else {
      renderForm();
    }

    function renderForm() {
      const methods = [
        ["card", "💳 신용/체크카드", true],
        ["kakaopay", "💬 카카오페이", false],
        ["naverpay", "Ⓝ 네이버페이", false],
        ["bank", "🏦 계좌이체", false],
      ];
      const agrees = [
        ["age", "[필수] 만 19세 이상입니다", true],
        ["terms", "[필수] 보험 약관 및 디포짓 환급 조건에 동의합니다", true],
        ["privacy", "[필수] 개인정보 수집·이용에 동의합니다", true],
        ["marketing", "[선택] 게으름 극복 알림 수신에 동의합니다", false],
      ];
      pageEl.innerHTML = `
        <nav class="breadcrumb">홈 › 가입 › <b>결제</b></nav>
        <h1 class="dp-title" style="font-size:26px">결제하기</h1>
        <div class="checkout-grid">
          <div class="co-main">
            <section class="co-card"><h3>주문 상품</h3>
              <div class="co-product"><span class="co-emoji">${p.emoji}</span>
                <div><b>${p.name}</b><small>${p.tagline}</small><a class="co-link" href="product.html?id=${p.id}">상품 상세 ›</a></div>
              </div></section>
            <section class="co-card"><h3>가입자 정보</h3>
              <div class="co-fields"><label>이름<input type="text" placeholder="홍길동" /></label>
              <label>휴대폰<input type="tel" placeholder="010-0000-0000" /></label></div></section>
            <section class="co-card"><h3>결제 수단</h3>
              <div class="pay-methods">${methods.map(([v, l, on]) => `<label class="pay-m${on ? " on" : ""}"><input type="radio" name="pay" value="${v}" ${on ? "checked" : ""}/><span>${l}</span></label>`).join("")}</div>
              <p class="co-note" id="kakao-note" style="display:none">💬 카카오페이를 선택하면 ${window.KAKAO_ENABLED ? "실제 카카오페이 테스트 결제창" : "(키 미설정 시 데모)"}으로 이동합니다.</p>
            </section>
            <section class="co-card"><h3>약관 동의</h3>
              <label class="agree-all"><input type="checkbox" id="agree-all"/><b>전체 동의</b></label>
              <div class="agree-list">${agrees.map(([k, l, req]) => `<label><input type="checkbox" class="agree" data-req="${req}"/>${l}</label>`).join("")}</div>
            </section>
          </div>
          <aside class="co-side"><div class="co-summary">
            <h3>결제 금액</h3>
            <div class="co-row"><span>월 보험료</span><b>${won(p.premium)}</b></div>
            <div class="co-row"><span>환급 디포짓</span><b>${won(p.deposit)}</b></div>
            <div class="co-note">※ 디포짓은 목표 달성 시 100% 환급됩니다.</div>
            <div class="co-total"><span>첫 결제 금액</span><b>${won(first)}</b></div>
            <button class="btn-primary co-pay" id="pay-btn">${won(first)} 결제하고 가입하기</button>
            <p class="co-legal">※ 해커톤 패러디 · 카카오페이는 테스트 결제입니다.</p>
          </div></aside>
        </div>`;

      const allBox = document.getElementById("agree-all");
      const boxes = [...document.querySelectorAll(".agree")];
      allBox.addEventListener("change", () => boxes.forEach((b) => (b.checked = allBox.checked)));
      boxes.forEach((b) => b.addEventListener("change", () => (allBox.checked = boxes.every((x) => x.checked))));

      const note = document.getElementById("kakao-note");
      document.querySelectorAll('input[name="pay"]').forEach((r) =>
        r.addEventListener("change", () => {
          document.querySelectorAll(".pay-m").forEach((m) => m.classList.toggle("on", m.querySelector("input").checked));
          note.style.display = document.querySelector('input[name="pay"]:checked').value === "kakaopay" ? "block" : "none";
        })
      );

      document.getElementById("pay-btn").addEventListener("click", () => {
        const reqOk = boxes.filter((b) => b.dataset.req === "true").every((b) => b.checked);
        if (!reqOk) { alert("필수 약관에 동의해 주세요."); return; }
        const sel = document.querySelector('input[name="pay"]:checked');
        const methodLabel = sel.parentElement.innerText.trim();

        if (sel.value === "kakaopay" && window.KAKAO_ENABLED) {
          // 실제 카카오페이 결제 준비 → 결제창으로 이동
          fetch(C.API_BASE + "/pay-ready", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: p.id, amount: first, name: p.name }),
          })
            .then((r) => r.json())
            .then((d) => {
              if (d && d.next && d.tid) {
                sessionStorage.setItem("lz_pay", JSON.stringify({ tid: d.tid, order: d.order, id: p.id }));
                location.href = d.next;
              } else {
                showDone("카카오페이(데모)");
              }
            })
            .catch(() => showDone("카카오페이(데모)"));
        } else {
          showDone(methodLabel);
        }
      });
    }
  </script>
</body>
</html>
