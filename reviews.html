<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>가입 후기 — lazylab</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="reviews">
  <header id="site-header"></header>
  <main>
    <section class="dark-hero">
      <p class="dh-eyebrow">REVIEWS</p>
      <h1>솔직한 가입 후기</h1>
      <p>게으름을 고백하고 보험을 든 분들의 진짜 이야기.</p>
    </section>
    <section class="list-wrap">
      <div class="review-summary" id="review-summary"></div>
      <div class="review-grid wide" id="review-grid"></div>
    </section>
  </main>
  <footer id="site-footer"></footer>

  <script src="./config.js"></script>
  <script src="./content.js"></script>
  <script src="./platform-data.js"></script>
  <script src="./terms-data.js"></script>
  <script src="./layout.js"></script>
  <script>
    const stars = (n) => "★★★★★".slice(0, n) + "☆☆☆☆☆".slice(0, 5 - n);
    const avg = (REVIEWS.reduce((s, r) => s + r.rating, 0) / REVIEWS.length).toFixed(1);
    document.getElementById("review-summary").innerHTML =
      `<div class="rs-score">${avg}<small>/5</small></div>
       <div class="rs-meta"><div class="rs-stars">${stars(Math.round(avg))}</div><span>가입 후기 ${REVIEWS.length}건 · 게으름연구소 인증</span></div>`;

    document.getElementById("review-grid").innerHTML = REVIEWS.map((r) => {
      const p = LZ.byId(r.pid) || {};
      return `<div class="rcard">
        <div class="rcard-stars">${stars(r.rating)}</div>
        <p>${r.text}</p>
        <div class="rcard-foot">
          <b>${r.who}</b>
          <a class="rcard-prod" href="product.html?id=${r.pid}">${p.emoji||""} ${p.name||""} ›</a>
        </div>
      </div>`;
    }).join("");
  </script>
</body>
</html>
