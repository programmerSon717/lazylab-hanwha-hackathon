<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>가입사례 — lazylab</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="cases">
  <header id="site-header"></header>
  <main id="page"></main>
  <footer id="site-footer"></footer>

  <script src="./config.js"></script>
  <script src="./content.js"></script>
  <script src="./platform-data.js"></script>
  <script src="./terms-data.js"></script>
  <script src="./layout.js"></script>
  <script>
    const won = LZ.won;
    const i = parseInt(LZ.qs("id") || "0", 10);
    const c = SUCCESS_CASES[i] || SUCCESS_CASES[0];
    const p = LZ.byId(c.pid) || PRODUCTS[0];
    const m = PRODUCT_META[p.id] || {};
    document.title = c.title + " — lazylab";

    const others = SUCCESS_CASES.filter((_, j) => j !== i)
      .map((x) => `<li><a href="case.html?id=${SUCCESS_CASES.indexOf(x)}">· [${x.badge}] ${x.title}</a></li>`).join("");

    document.getElementById("page").innerHTML = `
      <section class="dark-hero case-hero">
        <span class="case-badge">${c.badge}</span>
        <h1>${c.emoji} ${c.title}</h1>
        <p>${c.name} · ${c.date} · 조회수 ${c.views}</p>
      </section>

      <article class="doc case-body">
        <h3 class="d-sec">1. 상황</h3>
        <p>${c.situation}</p>
        <h3 class="d-sec">2. 처방 — 가입한 보험</h3>
        <p>${c.prescription}</p>
        <a class="product-inline" href="product.html?id=${p.id}">
          <span>${p.emoji}</span><div><b>${p.name}</b><small>월 ${won(p.premium)} · 디포짓 ${won(p.deposit)} · ${m.tag||""}</small></div><em>상품 보기 ›</em>
        </a>
        <h3 class="d-sec">3. 결과</h3>
        <p>${c.result}</p>

        <p class="copyright">lazylab의 모든 콘텐츠는 저작권법의 보호를 받습니다. (패러디)<br><small>본 사례는 해커톤 데모용으로 작성된 가상의 사례입니다.</small></p>

        <div class="designer-card">
          <div class="designer-info"><span class="d-ava">🐢</span><div><b>${c.designer}</b><small>게으름연구소 · lazylab 공식</small></div></div>
          <a class="btn-primary" href="signup.html?id=${p.id}">설계사 가입 상담 예약 ›</a>
        </div>

        <div class="other-posts">
          <h4>${c.designer}가 도운 다른 사례</h4>
          <ul>${others}</ul>
        </div>
      </article>`;
  </script>
</body>
</html>
