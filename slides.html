<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>lazylab — 발표 슬라이드</title>
  <style>
    :root { --orange:#f8643c; --orange-d:#e6501f; --navy:#2b3a55; --ink:#191e27; --gray:#8b919c; --soft:#fff1ec; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body { font-family:"Pretendard",system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif; background:#0f1115; color:var(--ink); overflow:hidden; }
    #deck { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
    .slide { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:6vh 8vw; text-align:center; background:#fff; opacity:0; transition:opacity .25s; }
    .slide.on { display:flex; opacity:1; }
    .slide.dark { background:var(--navy); color:#fff; }
    .slide.brand { background:linear-gradient(135deg,#fff5f0,#ffe2d6); }
    .tag { color:var(--orange); font-weight:800; letter-spacing:2px; font-size:1rem; margin-bottom:18px; text-transform:uppercase; }
    .slide.dark .tag { color:#ffb38f; }
    h1 { font-size:4.2rem; font-weight:800; line-height:1.12; letter-spacing:-1.5px; }
    h2 { font-size:3rem; font-weight:800; line-height:1.2; letter-spacing:-1px; margin-bottom:8px; }
    .lead { font-size:1.6rem; color:var(--gray); margin-top:22px; line-height:1.5; max-width:900px; }
    .slide.dark .lead { color:#c9cdd5; }
    .big { font-size:2.1rem; font-weight:700; line-height:1.5; max-width:980px; margin-top:10px; }
    .accent { color:var(--orange); }
    .logo { font-size:1.6rem; font-weight:800; color:var(--orange); margin-bottom:8px; }
    ul.points { list-style:none; margin-top:26px; max-width:920px; text-align:left; }
    ul.points li { font-size:1.5rem; line-height:1.5; margin:14px 0; padding-left:38px; position:relative; }
    ul.points li::before { content:"›"; position:absolute; left:0; color:var(--orange); font-weight:800; }
    .flow { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; margin-top:30px; }
    .flow span { background:var(--soft); color:var(--orange-d); border-radius:12px; padding:14px 20px; font-size:1.25rem; font-weight:700; }
    .flow .arr { background:none; color:var(--gray); align-self:center; padding:0 2px; }
    .levers { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:30px; max-width:1040px; }
    .lever { background:#fff; border:1px solid #eceef1; border-radius:16px; padding:20px; text-align:left; }
    .slide.dark .lever { background:#34425e; border-color:#3f4f6e; }
    .lever b { display:block; color:var(--orange); font-size:1.15rem; margin-bottom:6px; }
    .slide.dark .lever b { color:#ffb38f; }
    .lever span { font-size:1rem; color:var(--gray); line-height:1.45; }
    .slide.dark .lever span { color:#c9cdd5; }
    .feat { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-top:30px; max-width:1040px; }
    .feat div { background:var(--soft); border-radius:14px; padding:18px 12px; font-size:1.05rem; font-weight:600; }
    .feat .e { font-size:1.8rem; display:block; margin-bottom:6px; }
    .url { margin-top:30px; font-size:1.3rem; color:var(--orange); font-weight:700; }
    .punch { font-size:2.4rem; font-weight:800; font-style:italic; line-height:1.4; max-width:1000px; }
    /* chrome */
    #bar { position:fixed; top:0; left:0; height:5px; background:var(--orange); z-index:10; transition:width .25s; }
    #ctrl { position:fixed; bottom:18px; right:20px; display:flex; gap:8px; align-items:center; z-index:10; }
    #ctrl button { background:rgba(0,0,0,.06); border:none; border-radius:9999px; width:42px; height:42px; font-size:18px; cursor:pointer; }
    .slide.dark ~ #ctrl button { }
    #count { font-size:14px; color:#999; min-width:46px; text-align:center; }
    #lang { position:fixed; top:16px; right:20px; z-index:10; background:#fff; border:1px solid #e0e0e0; border-radius:9999px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer; color:var(--ink); }
    #hint { position:fixed; bottom:20px; left:20px; z-index:10; font-size:12px; color:#aaa; }
    @media (max-width:640px){ h1{font-size:2.4rem;} h2{font-size:1.8rem;} .lead{font-size:1.1rem;} .big{font-size:1.3rem;} .levers,.feat{grid-template-columns:1fr 1fr;} ul.points li{font-size:1.1rem;} .punch{font-size:1.5rem;} }
  </style>
</head>
<body>
  <div id="bar"></div>
  <button id="lang">English</button>
  <div id="deck"></div>
  <div id="ctrl"><button id="prev">‹</button><span id="count"></span><button id="next">›</button></div>
  <div id="hint">← → 또는 클릭으로 이동 · Language 토글</div>

  <script>
    let LANG = new URLSearchParams(location.search).get("lang") === "en" ? "en" : "ko";
    const S = (ko, en) => (LANG === "en" ? en : ko);

    const slides = [
      { cls: "brand", render: () => `
        <div class="tag">${S("청년들이 가장 고민하는 것 — 바로 게으름", "What young people worry about most — laziness")}</div>
        <div class="logo">🐢 lazylab</div>
        <h1>${S("게으름도<br>보장이 되나요?", "Can laziness<br>be insured?")}</h1>
        <p class="lead">${S("늦잠·미루기·작심삼일까지 — 당신의 게으름을 보장하는 보험 플랫폼", "An insurance platform that covers your laziness — oversleep, procrastination, broken resolutions")}</p>
        <div class="url">Hanwha Life × LIFE Hackathon</div>` },
      { cls: "", render: () => `
        <div class="tag">${S("문제 — 게으름은 사회적 문제다", "The Problem — laziness is now social")}</div>
        <div style="font-size:7rem;font-weight:800;color:var(--orange);line-height:1;letter-spacing:-3px">80%</div>
        <h2 style="font-size:2.2rem;margin-top:6px">${S("영(MZ) 제너레이션이 게으름·미루기로 힘들어하는 시대", "of the young (MZ) generation struggle with laziness & procrastination")}</h2>
        <ul class="points" style="margin-top:22px">
          <li>${S("의지는 평균 3일 — 헬스장은 <b>등록만</b>, 인강은 <b>결제만</b>", "Willpower lasts ~3 days — <b>sign up</b> but never go, <b>pay</b> but never watch")}</li>
          <li>${S("동기부여 앱 알림은 무시하면 그만 — <b>행동을 강제할 장치가 없다</b>", "Alerts are easy to ignore — <b>no mechanism forces action</b>")}</li>
          <li>${S("보험은 큰 사고만 보장 — <b>이 거대한 시장은 아무도 안 건드렸다</b>", "Insurance covers only big accidents — <b>this huge market is untapped</b>")}</li>
        </ul>` },
      { cls: "brand", render: () => `
        <div class="tag">${S("인사이트", "The Insight")}</div>
        <h2>${S("돈을 걸면 사람은 움직인다", "People act when money is on the line")}</h2>
        <p class="big">${S("게으름을 <span class='accent'>리스크</span>로 보고 보험으로 만든다. 디포짓을 걸고, 달성하면 환급, 실패하면 몰수.", "Treat laziness as a <span class='accent'>risk</span> and insure it. Stake a deposit, refunded on success, forfeited on failure.")}</p>
        <p class="lead">${S("핵심 역설 — 게으른 사람한테 팔면 망할 것 같지만, <b>게으르기 때문에 오히려 돈이 된다.</b>", "The twist — you'd think it'd bankrupt you, but <b>because they're lazy, it makes money.</b>")}</p>` },
      { cls: "", render: () => `
        <div class="tag">${S("솔루션", "The Solution")}</div>
        <h2>🐢 lazylab</h2>
        <p class="lead">${S("게으름 보장 플랫폼 — 9가지 게으름 상품", "Laziness-coverage platform — 9 products")}</p>
        <div class="feat">
          <div><span class="e">🔔</span>${S("늦잠", "Oversleep")}</div>
          <div><span class="e">📝</span>${S("미루기", "Procrastinate")}</div>
          <div><span class="e">🏋️</span>${S("운동", "Fitness")}</div>
          <div><span class="e">💸</span>${S("저축", "Savings")}</div>
          <div><span class="e">🍗</span>${S("야식", "Snacks")}</div>
          <div><span class="e">🧹</span>${S("정리", "Tidying")}</div>
          <div><span class="e">📚</span>${S("공부", "Study")}</div>
          <div><span class="e">💬</span>${S("연락", "Replies")}</div>
        </div>
        <p class="lead">${S("한 줄만 입력하면 딱 맞는 보험을 추천", "Type one line → the perfect policy")}</p>` },
      { cls: "", render: () => `
        <div class="tag">${S("작동 방식", "How it works")}</div>
        <h2>${S("고백 → 추천 → 가입 → 결제 → 관리", "Confess → Recommend → Enroll → Pay → Manage")}</h2>
        <div class="flow">
          <span>${S("게으름 고백", "Confess")}</span><span class="arr">→</span>
          <span>${S("맞춤 추천", "Recommend")}</span><span class="arr">→</span>
          <span>${S("카카오 로그인", "Kakao login")}</span><span class="arr">→</span>
          <span>${S("카카오페이 결제", "KakaoPay")}</span><span class="arr">→</span>
          <span>${S("약관 PDF·관리", "Policy PDF")}</span>
        </div>
        <p class="lead">${S("규칙 기반 추천이라 AI 키 없이도 항상 작동", "Rule-based — always works, no AI key")}</p>` },
      { cls: "dark", render: () => `
        <div class="tag">${S("수익 모델", "Revenue Model")}</div>
        <h2>${S("게으름이 곧 수익원", "Laziness IS the revenue")}</h2>
        <div class="levers">
          <div class="lever"><b>${S("① 디포짓 몰수", "① Deposit forfeiture")}</b><span>${S("대부분 실패 → 몰수", "Most fail → forfeited")}</span></div>
          <div class="lever"><b>${S("② 구독 관성", "② Subscription inertia")}</b><span>${S("해지가 귀찮아 안 함", "Too lazy to cancel")}</span></div>
          <div class="lever"><b>${S("③ 청구 마찰", "③ Claim friction")}</b><span>${S("청구도 귀찮아 안 함", "Too lazy to claim")}</span></div>
          <div class="lever"><b>${S("④ 혜택 미사용", "④ Unused perks")}</b><span>${S("안 써서 원가 ≈ 0", "Unused → ~0 cost")}</span></div>
          <div class="lever"><b>${S("⑤ 플로트 운용", "⑤ Float")}</b><span>${S("디포짓을 굴려 수익", "Invest the pool")}</span></div>
          <div class="lever"><b>${S("⑥ 제휴 수수료", "⑥ Partner fees")}</b><span>${S("제휴사 송객 수수료", "Referral commissions")}</span></div>
        </div>
        <p class="lead">${S("'고객을 끄는 매력'이 동시에 '수익 레버'", "Every customer hook is also a revenue lever")}</p>` },
      { cls: "", render: () => `
        <div class="tag">${S("핵심 기능", "Features")}</div>
        <h2>${S("진짜 서비스처럼 작동", "Works like a real service")}</h2>
        <div class="feat">
          <div><span class="e">💬</span>${S("카카오 로그인(실제)", "Real Kakao login")}</div>
          <div><span class="e">💳</span>${S("카카오페이 결제", "KakaoPay")}</div>
          <div><span class="e">📄</span>${S("영문 약관 PDF", "EN policy PDF")}</div>
          <div><span class="e">🤖</span>${S("상담 챗봇", "Chatbot")}</div>
          <div><span class="e">📰</span>${S("가상 뉴스", "Parody news")}</div>
          <div><span class="e">🛍</span>${S("마이페이지", "My Page")}</div>
          <div><span class="e">🤫</span>${S("수익구조 공개", "Profit model")}</div>
          <div><span class="e">🌐</span>${S("한/영 전환", "KO / EN")}</div>
        </div>` },
      { cls: "dark", render: () => `
        <div class="tag">${S("기술", "Tech")}</div>
        <h2>${S("전부 배포돼 실제로 돈다", "All live in production")}</h2>
        <ul class="points">
          <li>${S("빌드리스 정적 프론트 + <b>Netlify 서버리스 함수</b>", "Buildless static front + <b>Netlify serverless functions</b>")}</li>
          <li>${S("<b>카카오 로그인·카카오페이</b> 실제 API 연동", "<b>Real Kakao login & KakaoPay</b> API integration")}</li>
          <li>${S("영문 약관 <b>PDF 자동 생성</b> 스크립트", "<b>Auto-generated</b> English policy PDFs")}</li>
          <li>${S("전 페이지 <b>한/영 i18n</b>", "Full <b>KO/EN i18n</b> across all pages")}</li>
        </ul>` },
      { cls: "brand", render: () => `
        <div class="logo">🐢 lazylab</div>
        <p class="punch">"${S("게으름은 리스크가 아니라,<br>저희의 비즈니스 모델입니다.", "Laziness isn't a risk —<br>it's our business model.")}"</p>
        <div class="url">lazylab-hanwha-hackathon.netlify.app</div>
        <p class="lead">${S("감사합니다!", "Thank you!")}</p>` },
    ];

    let i = parseInt(new URLSearchParams(location.search).get("s") || "0", 10);
    if (isNaN(i) || i < 0 || i >= slides.length) i = 0;
    const deck = document.getElementById("deck");
    function render() {
      deck.innerHTML = slides.map((s, n) =>
        `<section class="slide ${s.cls} ${n === i ? "on" : ""}">${s.render()}</section>`).join("");
      document.getElementById("count").textContent = (i + 1) + " / " + slides.length;
      document.getElementById("bar").style.width = ((i + 1) / slides.length * 100) + "%";
      document.documentElement.lang = LANG;
    }
    function go(d) { i = Math.max(0, Math.min(slides.length - 1, i + d)); render(); }

    document.getElementById("next").onclick = () => go(1);
    document.getElementById("prev").onclick = () => go(-1);
    document.getElementById("lang").onclick = () => {
      LANG = LANG === "en" ? "ko" : "en";
      document.getElementById("lang").textContent = LANG === "en" ? "한국어" : "English";
      document.getElementById("hint").textContent = LANG === "en" ? "← → or click to move · toggle Language" : "← → 또는 클릭으로 이동 · Language 토글";
      render();
    };
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " ") go(1);
      else if (e.key === "ArrowLeft") go(-1);
    });
    deck.addEventListener("click", (e) => { if (!e.target.closest("a")) go(1); });
    if (LANG === "en") document.getElementById("lang").textContent = "한국어";
    render();
  </script>
</body>
</html>
