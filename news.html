<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>게으름연구소 뉴스 — lazylab</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="news">
  <header id="site-header"></header>
  <main>
    <section class="dark-hero">
      <p class="dh-eyebrow">LAZY NEWS</p>
      <h1>게으름연구소 뉴스</h1>
      <p>게으름에 관한 (수상할 만큼 진지한) 연구와 소식.</p>
    </section>
    <section class="list-wrap">
      <div class="news-cols" id="news-cols"></div>
    </section>
  </main>
  <footer id="site-footer"></footer>

  <script src="./config.js"></script>
  <script src="./content.js"></script>
  <script src="./platform-data.js"></script>
  <script src="./terms-data.js"></script>
  <script src="./layout.js"></script>
  <script>
    const idx = ARTICLES.map((a, i) => ({ a, i }));
    const hot = idx.filter((x) => x.a.hot), fresh = idx.filter((x) => !x.a.hot);
    document.getElementById("news-cols").innerHTML = `
      <div class="news-col"><h4>실시간 인기 뉴스</h4>${hot.map(({ a, i }, r) => `<a class="news-item" href="article.html?id=${i}"><span class="rank">${r + 1}</span>${a.title}</a>`).join("")}</div>
      <div class="news-col"><h4>최신 뉴스</h4>${fresh.map(({ a, i }) => `<a class="news-item dot" href="article.html?id=${i}">${a.title}</a>`).join("")}</div>`;
  </script>
</body>
</html>
