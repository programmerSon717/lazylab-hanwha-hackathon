<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>내 가입 상품 — lazylab</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="mypage">
  <header id="site-header"></header>
  <main class="doc" id="page"></main>
  <footer id="site-footer"></footer>

  <script src="./config.js"></script>
  <script src="./content.js"></script>
  <script src="./platform-data.js"></script>
  <script src="./terms-data.js"></script>
  <script src="./layout.js"></script>
  <script>
    const won = LZ.won;
    const user = localStorage.getItem("lz_user");
    const ids = (() => { try { return JSON.parse(localStorage.getItem("lz_products") || "[]"); } catch (e) { return []; } })();
    const page = document.getElementById("page");

    if (!user) {
      page.innerHTML = `<div class="mypage-empty"><div class="empty-ico">🔒</div>
        <h2>로그인이 필요해요</h2><p>가입한 상품을 보려면 먼저 로그인하세요.</p>
        <a class="btn-primary" href="signup.html">로그인 / 가입</a></div>`;
    } else if (ids.length === 0) {
      page.innerHTML = `<nav class="breadcrumb">홈 › <b>내 가입 상품</b></nav>
        <div class="mypage-empty"><div class="empty-ico">📭</div>
        <h2>${user}님, 아직 가입한 상품이 없어요</h2><p>게으름을 보장받고 디포짓을 돌려받아 보세요!</p>
        <a class="btn-primary" href="index.html#products">상품 둘러보기</a></div>`;
    } else {
      const cards = ids.map((id) => {
        const p = LZ.byId(id); if (!p) return "";
        const m = PRODUCT_META[id] || {};
        return `<div class="my-card">
          <div class="my-top"><span class="my-emoji">${p.emoji}</span>
            <div><span class="my-tag">${m.tag || "게으름"}</span>
              <b>${p.name}</b><small>${p.tagline}</small></div>
            <span class="my-status">가입중</span>
          </div>
          <div class="my-info">
            <span>월 보험료 <b>${won(p.premium)}</b></span>
            <span>환급 디포짓 <b>${won(p.deposit)}</b></span>
          </div>
          <div class="my-actions">
            <a class="btn-primary sm" href="policies/${id}.pdf" target="_blank" rel="noopener">📄 보험약관 (PDF)</a>
            <a class="btn-ghost sm" href="product.html?id=${id}">상품 상세</a>
            <button class="btn-ghost sm my-cancel" data-id="${id}">해지</button>
          </div>
        </div>`;
      }).join("");
      page.innerHTML = `<nav class="breadcrumb">홈 › <b>내 가입 상품</b></nav>
        <h1 class="dp-title" style="font-size:24px">${user}님의 가입 상품 <span style="color:var(--orange)">${ids.length}</span></h1>
        <p class="dp-meta" style="border:none">가입한 상품의 영문 보험약관(Policy Wording)을 PDF로 확인할 수 있어요.</p>
        <div class="my-list">${cards}</div>`;

      page.querySelectorAll(".my-cancel").forEach((b) =>
        b.addEventListener("click", () => {
          if (!confirm("정말 해지하시겠어요? (디포짓은 환급되지 않습니다 — 패러디)")) return;
          const next = ids.filter((x) => x !== b.dataset.id);
          localStorage.setItem("lz_products", JSON.stringify(next));
          location.reload();
        })
      );
    }
  </script>
</body>
</html>
