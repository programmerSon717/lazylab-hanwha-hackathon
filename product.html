<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>상품 상세 — lazylab</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body data-page="products">
  <header id="site-header"></header>
  <main class="doc" id="page"></main>
  <footer id="site-footer"></footer>

  <script src="./config.js"></script>
  <script src="./content.js"></script>
  <script src="./platform-data.js"></script>
  <script src="./terms-data.js"></script>
  <script src="./i18n.js"></script>
  <script src="./layout.js"></script>
  <script>
    const T = window.t, won = LZ.won, EN = window.LANG === "en";
    const p0 = LZ.byId(LZ.qs("id")) || PRODUCTS[0];
    const p = window.LP(p0);
    const m = window.LMETA(p0.id);
    const t = window.LT(p0.id);
    document.title = p.name + " — lazylab";

    const members = EN ? (m.members || 1000).toLocaleString("en-US") + " enrolled" : (m.members || 1000).toLocaleString("ko-KR") + "명";
    const tags = ["#" + (m.tag || "lazy").replace(/[\/ ]/g, "_"), T("#게으름보험", "#LazinessInsurance"), T("#디포짓환급", "#DepositRefund"), T("#작심삼일", "#ResolutionBreaker")];
    const defRows = (t.definitions || []).map(([k, d]) => `<tr><td>${k}</td><td>${d}</td></tr>`).join("");
    const benRows = (t.benefits || []).map(([c, pay]) => `<tr><td>${c}</td><td>${pay}</td></tr>`).join("");
    const exc = (t.exclusions || []).map((x) => `<li>${x}</li>`).join("");
    const cov = p.coverage.map((c) => `<li>${c}</li>`).join("");
    const levers = p.profit.map(([n, d]) => `<li><b>${n}</b><span>${d}</span></li>`).join("");
    const related = PRODUCTS.filter((x) => x.id !== p0.id).slice(0, 5)
      .map((x) => `<a href="product.html?id=${x.id}"><span>${x.emoji}</span><div><b>${window.LP(x).name}</b><small>${window.LMETA(x.id).tag || ""}</small></div></a>`).join("");
    const caseEn = (EN && window.EN_CASES ? window.EN_CASES : SUCCESS_CASES).find((c, i) => SUCCESS_CASES[i].pid === p0.id);
    const designer = caseEn ? caseEn.designer : T("게으름연구소 설계팀", "Lazylab Underwriting Team");

    document.getElementById("page").innerHTML = `
      <nav class="breadcrumb">${T("홈", "Home")} › ${T("보험상품", "Products")} › <b>${m.tag || ""}</b></nav>
      <div class="doc-grid">
        <article class="doc-main">
          <span class="dp-cat">${m.tag || ""}</span>
          <h1 class="dp-title">${p0.emoji} ${p.name}</h1>
          <p class="dp-lead">${p.tagline}</p>
          <p class="dp-meta">${T("상품코드", "Policy No.")} ${t.code || "-"} · ${T("가입자", "Members")} ${members} · ${T("조회수", "Views")} ${(m.members || 1000) * 3}</p>
          <div class="price-row">
            <div class="price-box"><span>${T("월 보험료", "Monthly premium")}</span><b>${won(p0.premium)}</b></div>
            <div class="price-box"><span>${T("환급 디포짓", "Refundable deposit")}</span><b>${won(p0.deposit)}</b></div>
            <div class="price-box"><span>${T("가입대상", "Eligibility")}</span><b style="font-size:14px">${t.target || ""}</b></div>
          </div>
          <h3 class="d-sec">${T("보장 내용", "Coverage")}</h3>
          <ul class="coverage">${cov}</ul>
          <div class="refund">🎁 ${p.refund}</div>
          <p class="consolation">😌 ${p.consolation}</p>
          <h3 class="d-sec">${T("약관 핵심 — 용어의 정의", "Key terms — Definitions")}</h3>
          <table class="doc-table"><tr><th>${T("용어", "Term")}</th><th>${T("정의", "Definition")}</th></tr>${defRows}</table>
          <h3 class="d-sec">${T("보험금 지급 사유", "Insured events & benefits")}</h3>
          <table class="doc-table"><tr><th>${T("지급 사유", "Event")}</th><th>${T("지급 내용", "Benefit")}</th></tr>${benRows}</table>
          <h3 class="d-sec">${T("면책 사항", "Exclusions")}</h3>
          <ol class="excl">${exc}</ol>
          <div class="hashtags">${tags.map((h) => `<span class="tag-chip">${h}</span>`).join("")}</div>
          <div class="doc-react"><span>🙂 ${T("궁금해요", "Curious")}</span><span>☆ ${T("관심상품", "Save")}</span><span>↗ ${T("공유하기", "Share")}</span></div>
          <div class="ad-banner">
            <b>${T("게으름연구소가 설계한 맞춤 보험", "A tailored policy by the Institute of Laziness")}</b> ${T("으로 확실하게!", "— make it count!")}
            <a class="btn-primary sm2" href="checkout.html?id=${p0.id}">${T("쿠폰받고 가입하기", "Get coupon & enroll")} ›</a>
          </div>
          <div class="dp-actions">
            <a class="btn-primary" href="checkout.html?id=${p0.id}">${T("가입하기", "Enroll")}</a>
            <button class="btn-ghost egg-toggle" type="button">🤫 ${T("보험사 수익구조 보기", "View insurer profit model")}</button>
          </div>
          <div class="egg" hidden><ul class="levers">${levers}</ul><p class="punch">"${p.punch}"</p></div>
          <div class="designer-card">
            <div class="designer-info"><span class="d-ava">🐢</span><div><b>${designer}</b><small>${T("게으름연구소 · lazylab 공식", "Institute of Laziness · lazylab official")}</small></div></div>
            <a class="btn-primary" href="checkout.html?id=${p0.id}">${T("가입 상담 예약", "Book a consultation")} ›</a>
          </div>
        </article>
        <aside class="doc-side">
          <h4>${T("이런 상품도 어때요?", "You might also like")}</h4>
          <div class="side-list">${related}</div>
        </aside>
      </div>`;

    const egg = document.querySelector(".egg");
    document.querySelector(".egg-toggle").addEventListener("click", (e) => {
      egg.hidden = !egg.hidden; e.currentTarget.classList.toggle("open", !egg.hidden);
    });
  </script>
</body>
</html>
